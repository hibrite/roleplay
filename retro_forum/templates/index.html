<!DOCTYPE html>
<html>
<head>
    <title>Retro Forum</title>
    <style>
        #sidebar { float: left; width: 250px; padding: 20px; border-right: 1px solid #ccc; }
        .modal { display:none; position:fixed; top:20%; left:30%; background:#fff; border:1px solid #000; padding:20px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>帳號管理</h3>
    <form action="/login" method="POST">
        <input type="text" name="username" placeholder="登入帳號" required>
        <button type="submit">登入</button>
    </form>
    <br>
    <form action="/register" method="POST">
        <input type="text" name="username" placeholder="新帳號註冊" required>
        <button type="submit">註冊</button>
    </form>

    <h3>切換帳號</h3>
    {% for user in users %}
    <div>
        <a href="#" onclick="alert('使用者: {{ user.username }}')">{{ user.username }}</a>
        <a href="/switch_user/{{ user.username }}">[切換]</a>
        <a href="/logout/{{ user.username }}">[登出]</a>
    </div>
    {% endfor %}
</div>

<div style="margin-left: 280px;">
    {% if current_user %}
    <h3>發表新主題 (目前: {{ current_user }})</h3>
    <form action="/create_post" method="POST">
        <input type="text" name="title" placeholder="標題" required>
        <textarea name="content" placeholder="內文" required></textarea>
        <button type="submit">發布</button>
    </form>
    {% else %}
    <p style="color:red;">請先登入或註冊以進行發文</p>
    {% endif %}

    <hr>
    {% for post in posts %}
    <div>
        <h4>{{ post.title }} <small>by {{ post.username }}</small></h4>
        <p>{{ post.content }}</p>
    </div>
    {% endfor %}
</div>

</body>
</html>
